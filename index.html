<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MARINE CORE 足の健康チェック</title>
<style>
  :root{
    --navy:#12233b; --navy-soft:#13385f; --blue:#eaf2fc; --blue-mid:#cfe4fa;
    --accent:#2f6bf0; --accent-ink:#2159d6; --gray:#8b95a6; --gray-soft:#f4f6fa;
    --line:#eceff4; --white:#fff; --low:#25b485;
    --radius:22px; --shadow:0 12px 34px rgba(10,37,64,.12);
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
    color:var(--navy);background:var(--gray-soft);line-height:1.7}
  header.top{display:flex;align-items:center;gap:10px;padding:16px 18px;background:#fff;border-bottom:1px solid var(--line)}
  header .logo{width:40px;height:28px;display:block}
  header b{font-size:17px;letter-spacing:.02em}
  header span{font-size:11px;color:var(--gray);display:block;font-weight:400;letter-spacing:.06em}
  .wrap{max-width:640px;margin:0 auto;padding:26px 16px 60px}
  .hero{text-align:center;margin:8px 0 22px}
  .hero h1{font-size:24px;margin:0 0 8px}
  .hero p{color:var(--gray);font-size:14px;margin:0}

  .menu{display:flex;flex-direction:column;gap:16px}
  a.choice{display:flex;align-items:center;gap:16px;text-decoration:none;color:inherit;
    background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);
    transition:transform .15s ease,box-shadow .2s}
  a.choice:active{transform:scale(.99)}
  a.choice .ic{width:58px;height:58px;border-radius:16px;flex:none;display:flex;align-items:center;justify-content:center;font-size:28px}
  a.choice.pressure .ic{background:linear-gradient(135deg,var(--navy),var(--accent));color:#fff}
  a.choice.check .ic{background:linear-gradient(135deg,#25b485,#6fd8a6);color:#fff}
  a.choice .t{flex:1}
  a.choice .t b{font-size:17px;display:block}
  a.choice .t .tag{font-size:11px;font-weight:800;color:#fff;padding:2px 9px;border-radius:999px;display:inline-block;margin-bottom:6px}
  a.choice.pressure .t .tag{background:var(--accent)}
  a.choice.check .t .tag{background:var(--low)}
  a.choice .t p{margin:4px 0 0;font-size:13px;color:var(--gray)}
  a.choice .arw{color:var(--gray);font-size:22px;flex:none}

  .sub{text-align:center;margin-top:24px}
  .sub a{color:var(--gray);font-size:13px;text-decoration:none;border-bottom:1px dotted var(--gray)}
  .note{font-size:10.5px;color:var(--gray);line-height:1.5;margin-top:20px;text-align:center}
</style>
</head>
<body>

<header class="top">
  <svg class="logo" viewBox="0 0 38 26" aria-label="MARINE CORE"><defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#12233b"/><stop offset="1" stop-color="#2f6bf0"/></linearGradient></defs>
    <path fill="url(#g)" d="M2 20c6 0 8-6 14-6 4 0 6 3 10 3 3 0 5-2 5-2 0 6-6 9-12 9C10 24 2 20 2 20Zm5-7C10 8 15 4 22 4c5 0 9 3 11 7-2-1-4-2-7-2-6 0-8 5-13 5-3 0-6-1-6-1Z"/></svg>
  <div><b>MARINE CORE</b><span>足の健康チェック</span></div>
</header>

<div class="wrap">
  <div class="hero">
    <h1>どちらを使いますか？</h1>
    <p>目的に合わせて選んでください</p>
  </div>

  <div class="menu">
    <a class="choice pressure" href="report.html">
      <div class="ic">📊</div>
      <div class="t">
        <span class="tag">測定機あり・プロ用</span>
        <b>足圧診断（レポート）</b>
        <p>足圧計で測って、装着前→後の変化を詳しいレポートに。店頭・施設での測定に。</p>
      </div>
      <div class="arw">›</div>
    </a>

    <a class="choice check" href="check.html">
      <div class="ic">🦶</div>
      <div class="t">
        <span class="tag">機器なし・スマホで1分</span>
        <b>かんたん足チェック</b>
        <p>道具いらず。片足立ち＋数問で「足年齢・転倒リスク」の目安が分かります。</p>
      </div>
      <div class="arw">›</div>
    </a>
  </div>

  <div class="sub">
    <a href="score.html">従来の MARINE SCORE 診断はこちら</a>
  </div>

  <div class="note">※各チェックは足の状態の「目安・参考」を示すもので、医学的な診断ではありません。気になる方は専門家にご相談ください。<br>MARINE CORE ／ 株式会社アドニス</div>
</div>

</body>
</html>
